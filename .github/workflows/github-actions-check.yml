name: Python package

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  lint:
    # Quality checks run once on the latest supported Python. Running them across
    # the whole matrix breaks black's AST safety check on older runners when
    # target-version includes a newer Python than the runner.
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]
    - name: Check with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Check with black
      run: |
        black . --check -l 120
    - name: Check with isort
      run: |
        isort --check -l 120 .
    - name: Check with mypy
      run: |
        mypy telegram_menu
    - name: Check with pylint
      run: |
        pylint telegram_menu tests -E
    - name: Check with pydocstyle
      run: |
        pydocstyle telegram_menu
    - name: Check with pycodestyle
      run: |
        pycodestyle --max-line-length=120 telegram_menu

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]
    - name: Run tests
      run: |
        pytest -W ignore::DeprecationWarning
